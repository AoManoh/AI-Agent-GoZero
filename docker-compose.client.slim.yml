# 服务器部署时指定**挂载** nginx 镜像
services:
  client:
    image: nginx:alpine
    ports:
      - "8080:80"  # 避开宿主 Nginx 的 80
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
