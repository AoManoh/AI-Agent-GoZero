# 服务器部署时叠加 docker-compose.yml 使用，挂载已构建的前端 dist 到 Nginx
services:
  client:
    image: nginx:alpine
    ports:
      - "8080:80"  # 避开宿主 Nginx 的 80
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      user:
        condition: service_started
