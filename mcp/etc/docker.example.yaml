# ==========================================
# GoZero-AI MCP服务 Docker环境配置文件
# ==========================================
# 功能: MCP(文档处理微服务)在Docker容器环境下的专用配置
# 服务: 提供gRPC接口，支持PDF文档解析和文本提取
# 环境: 适用于容器化部署，使用ETCD进行服务注册发现
# 依赖: UniPDF商业版许可证，支持高级PDF处理功能
# 协议: gRPC高性能通信协议，低延迟二进制数据传输

# ==========================================
# 服务基础配置
# ==========================================
# 服务名称标识，用于服务注册和路由发现
Name: mcp.rpc
# gRPC服务监听地址和端口，0.0.0.0表示接受所有网络接口的连接
# 端口注意: 8321为MCP服务的标准gRPC端口
ListenOn: 0.0.0.0:8321 # 一定要注意这儿端口
# ==========================================
# ETCD服务注册发现配置
# ==========================================
# 功能: 连接到ETCD服务注册中心，实现微服务的自动发现和负载均衡
# 架构: GoZero框架的核心组件，支持服务注册、配置管理和健康检查
Etcd:
  # ETCD服务器地址列表，支持多节点集群部署
  Hosts:
    # 本地开发环境配置 (已注释)
    # - 127.0.0.1:2379
    # Docker环境配置 (当前生效)：使用Docker服务名进行服务发现
    # 注意：2379是ETCD的标准客户端端口
    - etcd:2379 # 使用 Docker 的服务名
  # 服务注册的唯一标识键，用于区分不同的微服务实例
  Key: mcp.rpc

# ==========================================
# UniPDF商业版许可证配置
# ==========================================
# 功能: 激活UniPDF商业版功能，支持高级PDF处理能力
# 特性: 去除水印、支持复杂版面、高精度文本提取、图像处理
# 注意: 请确保许可证的合法性和有效性，避免版权问题
# 安全: 生产环境中应使用环境变量或加密配置文件存储许可证
# 获取: 请访问 https://unidoc.io 获取你自己的许可证
# UniPDF 商业版许可证密钥
UniPDFLicense: "your-unipdf-license-key-here"
