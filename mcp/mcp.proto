// mcp.proto - MCP (Message Communication Protocol) gRPC 服务契约定义
// 这是GoZero-AI项目中的核心gRPC服务定义文件，负责PDF文档处理的微服务通信协议
//
// 主要功能:
//  1. PDF文档上传与解析 - 支持大文件流式传输，避免内存溢出
//  2. 文本内容提取 - 将PDF文档转换为纯文本，供RAG系统使用
//  3. 错误处理机制 - 提供完整的错误信息反馈
//  4. 元数据管理 - 支持文件名、MIME类型等文件属性传递
//
// 技术特性:
//   - 使用Protocol Buffers 3.0语法
//   - 支持双向流式RPC，适合大文件处理
//   - 采用分块传输机制，提高传输效率
//   - 兼容GoZero框架的gRPC生成工具
//
// 应用场景:
//   - 企业文档管理系统的文档解析
//   - RAG知识库构建中的PDF文档预处理
//   - 智能文档分析系统的文本提取
//   - 大规模文档批处理系统
//
// 架构设计:
//   - 客户端: GoZero-AI/api 服务 (HTTP -> gRPC转换)
//   - 服务端: GoZero-AI/mcp 服务 (gRPC PDF处理器)
//   - 协议层: 本文件定义的gRPC接口契约
//
// 生成代码命令:
//   在 /mcp 目录下执行:
//   goctl rpc protoc mcp.proto --go_out=./types --go-grpc_out=./types --zrpc_out=.
syntax = "proto3";

// 包名定义 - 用于生成Go代码的包结构
package mcp;

// Go包路径设置 - 指定生成的Go代码包路径
// 这将在当前目录的mcp子目录中生成相关的Go文件
option go_package = "./mcp";

// ============================================================================
// 服务定义区域
// ============================================================================

// PdfProcessor gRPC服务定义
// 专门处理PDF文档的解析和文本提取功能
//
// 设计理念:
//  1. **流式处理** - 支持大文件上传，避免内存限制
//  2. **实时响应** - 边上传边处理，提高用户体验
//  3. **错误隔离** - 独立的PDF处理服务，不影响主应用
//  4. **可扩展性** - 微服务架构，便于水平扩展
//
// 使用模式:
//   客户端发送: Metadata -> Chunk1 -> Chunk2 -> ... -> ChunkN
//   服务端返回: Progress -> Progress -> ... -> FinalContent
//
// 性能优势:
//   - 内存占用低: 分块处理，不需要将整个文件加载到内存
//   - 传输效率高: 流式传输，支持并发处理
//   - 故障恢复: 可以在传输中断后从断点继续
service PdfProcessor {
  // ExtractTextFromPDF 流式PDF文本提取方法
  // 接收PDF文件流，返回解析后的文本内容流
  //
  // 处理流程:
  //  1. 客户端首先发送包含文件元数据的PdfReq
  //  2. 然后分块发送PDF文件的二进制数据
  //  3. 服务端实时处理并返回解析进度和结果
  //  4. 最终返回完整的文本内容
  //
  // 错误处理:
  //   - 文件格式错误: 返回格式不支持的错误信息
  //   - 文件损坏: 返回解析失败的具体原因
  //   - 网络中断: 支持重新连接和断点续传
  //
  // **后续**扩展可能:
  //   - 支持多种文档格式 (Word, PowerPoint等)
  //   - 添加OCR文字识别功能
  //   - 支持文档结构化解析
  //   - 集成文档安全检查
  rpc ExtractTextFromPDF(stream PdfReq) returns (PdfRes) {}
}

// ============================================================================
// 消息结构定义区域
// ============================================================================

// PdfReq PDF处理请求消息
// 使用oneof联合类型支持不同阶段的数据传输
//
// 设计模式: 状态机模式
//  状态1: 发送元数据 (metadata字段)
//  状态2: 发送文件数据块 (chunk字段)
//
// 数据流设计:
//   第一条消息: PdfReq{metadata: Metadata{filename: "doc.pdf", mime_type: "application/pdf"}}
//   后续消息:   PdfReq{chunk: []byte{PDF二进制数据}}
//
// 优势分析:
//   - 类型安全: oneof确保每条消息只包含一种类型的数据
//   - 内存效率: 避免同时传输元数据和大块数据
//   - 协议清晰: 明确区分控制信息和数据信息
message PdfReq {
  oneof data {
    Metadata metadata = 1;  // 文件元数据信息 - 仅在首条消息中使用
    bytes chunk = 2;        // 文件数据块 - 在后续消息中分块传输文件内容
  }
}

// PdfRes PDF处理响应消息
// 服务端向客户端返回处理结果和状态信息
//
// 响应类型:
//  1. **进度响应**: content包含部分解析结果，error为空
//  2. **成功响应**: content包含完整文本内容，error为空
//  3. **错误响应**: content为空，error包含错误描述
//
// 使用场景:
//   - 实时反馈: 客户端可以实时显示解析进度
//   - 错误处理: 详细的错误信息帮助诊断问题
//   - 结果传递: 高效传输解析后的文本内容
//
// **后续**优化方向:
//   - 添加progress字段显示解析百分比
//   - 添加page_count字段显示总页数信息
//   - 支持结构化内容返回 (章节、表格等)
message PdfRes {
  string content = 1;  // 解析后的文本内容 - 可能是部分内容(流式)或完整内容(最终)
  string error = 2;    // 错误信息 - 当处理失败时包含具体的错误描述
}

// Metadata 文件元数据信息
// 包含PDF文件的基本属性信息，用于处理前的验证和配置
//
// 字段说明:
//   filename: 原始文件名，用于日志记录和结果追踪
//   mime_type: MIME类型，用于文件格式验证
//
// 验证规则:
//   - filename: 必须非空，建议包含文件扩展名
//   - mime_type: 必须为"application/pdf"或相关PDF MIME类型
//
// 扩展字段 (**后续**可能添加):
//   - file_size: 文件大小，用于进度计算
//   - checksum: 文件校验和，确保传输完整性
//   - encoding: 文件编码信息
//   - creation_time: 文件创建时间
message Metadata {
  string filename = 1;   // 文件名 - 原始PDF文件的名称，用于标识和日志记录
  string mime_type = 2;  // MIME类型 - 文件的媒体类型，通常为"application/pdf"
}

// ============================================================================
// 代码生成说明
// ============================================================================
//
// 在 /mcp 目录下执行以下命令生成gRPC代码:
//   goctl rpc protoc mcp.proto --go_out=./types --go-grpc_out=./types --zrpc_out=.
//
// 生成文件说明:
//   ./types/mcp.pb.go        - Protocol Buffers消息定义的Go代码
//   ./types/mcp_grpc.pb.go   - gRPC服务接口的Go代码
//   ./mcp.go                 - GoZero RPC服务主文件
//   ./etc/mcp.yaml          - 服务配置文件
//   ./internal/             - 业务逻辑实现目录
//
// 集成说明:
//   生成的代码将与GoZero框架集成，提供:
//   - 自动服务发现
//   - 负载均衡
//   - 熔断器
//   - 链路追踪
//   - 监控指标