# 部署到服务器中用 docker-compose 启动
# 此时启用该配置
# 本地无须启动该配置
server {
    listen       80;
    server_name  localhost;

    # 前端静态文件根目录
    root   /usr/share/nginx/html;

    # 上传文件大小限制（支持PDF等大文件）
    client_max_body_size 50m;

    # 所有HTML请求都返回index.html（解决前端路由404）
    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # User API：认证、工作台、简历资产、报告中心等，保留 /api/users 前缀
    location ^~ /api/users {
        proxy_pass http://user:8124;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off; proxy_cache off; chunked_transfer_encoding off;
        proxy_read_timeout 600s;
        add_header X-Accel-Buffering no;
        gzip off;
    }

    # Chat API：SSE 流式面试与知识库接口，保留 /api/ai 前缀
    location ^~ /api/ai {
        proxy_pass http://api:8123;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off; proxy_cache off; chunked_transfer_encoding off;
        proxy_read_timeout 600s;
        add_header X-Accel-Buffering no;
        gzip off;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # 错误页
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

