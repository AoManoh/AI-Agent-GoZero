# ==========================================
# GoZero-AI API服务 Docker环境配置文件
# ==========================================
# 功能: API服务在Docker容器环境下的专用配置
# 环境: 适用于容器化部署，使用Docker服务名进行服务间通信
# 特性: 支持流式对话、RAG知识库检索、向量存储
# 集成: OpenAI API、PostgreSQL向量数据库、Redis缓存、MCP文档处理

# ==========================================
# 服务基础配置
# ==========================================
# 服务名称标识，用于服务注册和日志记录
Name: chat
# 服务监听地址，0.0.0.0表示接受所有网络接口的连接
Host: 0.0.0.0
# HTTP服务端口，对外提供RESTful API服务
Port: 8123
# 超时配置：禁用超时，因为流式输出需要持久输出，如果启用超时断开的话，可能会影响服务的稳定性
Timeout: 0 # 禁用超时，因为流式输出需要持久输出，如果启用超时断开的话，可能会影响服务的稳定性
MaxBytes: 52428800 # 允许最大 50MB 的请求体，匹配 PDF 上传链路

Auth:
  AccessSecret: "your-user-access-secret" # 必须与 user 服务保持一致，用于解析可选 Bearer token

# ==========================================
# OpenAI API配置 (大语言模型集成)
# ==========================================
# 支持多种大语言模型服务提供商，包括千问、Gemini等
OpenAI:
  # ==========================================
  # 对话模型配置
  # ==========================================
  ApiKeyEnv: "OPENAI_API_KEY"
  BaseURL: "http://sub2api.aomanoh.com:18080/v1"
  Model: "gpt-5.4"
  
  # ==========================================
  # 阿里云千问模型配置 (备选)
  # ==========================================
  # 阿里云千问大模型服务配置，支持中文优化和多模态功能
  # ApiKey: "your-dashscope-api-key"
  # BaseURL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # Model: "qwen-plus"
  
  # ==========================================
  # 其他兼容 OpenAI API 的模型 (备选)
  # ==========================================
  # ApiKey: "your-api-key"
  # BaseURL: "https://your-api-endpoint/v1"
  # Model: "your-model-name"

  # ==========================================
  # 模型参数配置
  # ==========================================
  # 生成文本的最大token数量限制，控制输出长度和成本
  MaxCompletionTokens: 2048           # 最大token数，注意，原 MaxTokens 已废弃
  # 模型创造性参数，值越大输出越变化，值越小输出越稳定
  Temperature: 0.7          # 温度参数

Embedding:
  ApiKeyEnv: "DASHSCOPE_API_KEY"
  BaseURL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  Model: "text-embedding-v2"

# ==========================================
# 向量数据库配置 (PostgreSQL + pgvector)
# ==========================================
# 功能: 支持RAG(检索增强生成)的向量存储和语义检索
# 技术: 使用pgvector扩展实现高性能向量相似度计算
# 向量数据库配置
VectorDB:
  # 数据库服务器地址 (使用Docker服务名)
  Host: "postgres"
  # PostgreSQL标准端口
  Port: 5432
  # 数据库名称，与Docker环境中的POSTGRES_DB一致
  DBName: "gozero_ai_agent"
  # 数据库用户名，与Docker环境中的POSTGRES_USER一致
  User: "postgres"
  # 数据库密码，与Docker环境中的POSTGRES_PASSWORD一致
  Password: "your-database-password"
  # 向量存储表名，用于存储文档向量和元数据
  Table: "vector_store"
  # 数据库连接池的最大连接数，优化并发性能
  MaxConn: 20       # 最大连接数
  # ==========================================
  # 嵌入模型配置
  # ==========================================
  # 文本嵌入向量生成模型，用于将文本转换为向量表示
  EmbeddingModel: "text-embedding-v2" # 千问嵌入模型，固定 1536 维
  # EmbeddingModel: "text-embedding-3-small" # OpenAI 嵌入模型
  # 更新 RAG 本地知识库配置
  # ==========================================
  # RAG知识库配置参数
  # ==========================================
  # 知识库分块和检索优化参数，影响检索质量和响应速度
  TimeZone: "Asia/Shanghai" # <--- 在这里新增时区配置
  Knowledge:
    # 单个知识分块的最大字符数，影响检索精度和上下文连贯性
    MaxChunkSize: 1000 # 知识块最大长度
    # 向量检索返回的相关知识片段数量，影响上下文丰富度
    TopK: 3 # 检索返回的知识片数量
    # 注入到模型上下文的最大字符数，避免超出模型输入限制
    MaxContextLength: 500 # 注入上下文的截断长度

# ==========================================
# MCP文档处理服务配置
# ==========================================
# 功能: 连接到MCP(PDF处理)微服务，提供文档解析和文本提取能力
# 协议: 使用gRPC协议进行服务间通信，支持高性能和低延迟
# MCP 服务配置
MCP:
  # Docker环境配置 (当前生效)：使用Docker服务名进行服务发现
  Endpoint: "mcp:8321" # 使用 Docker 服务名
  AuthToken: "your-mcp-auth-token"
  MaxUploadBytes: 52428800
  # 本地开发环境配置 (已注释)：直接连接本地MCP服务
  # Endpoint: 127.0.0.1:8080 # MCP服务地址

# ==========================================
# Redis缓存服务配置
# ==========================================
# 功能: 高性能内存数据库，用于会话状态管理和高频数据缓存
# 特性: 支持数据持久化、主从复制和高可用性部署
# 用途: 存储对话上下文、用户状态、频率限制等数据
# Redis 配置
Redis:
  # 本地开发环境配置 (已注释)
  # Host: "127.0.0.1"
  # Docker环境配置 (当前生效)：使用Docker服务名进行服务发现
  Host: "redis" # 使用 Docker 服务名
  # Redis标准端口
  Port: 6379
  # Redis访问密码（未设置，生产环境建议配置密码）
  Password: ""
  # Redis数据库编号，默认使用第0号数据库
  DB: 0
