# 服务名称
Name: user-api

# 服务监听配置
Host: 0.0.0.0
Port: 8124 # 必须使用一个与 chat 服务 (8123) 不同的端口
MaxBytes: 52428800
Timeout: 60000

# ----------------------------
# 1. PostgreSQL 数据库配置
# ----------------------------
# 用于 user 服务的核心数据库，存储 users, knowledge_base 等表
Postgres:
  DataSource: "postgresql://root:your_password.@127.0.0.1:5432/gozero_ai_agent?sslmode=disable&TimeZone=Asia/Shanghai"

OpenAI:
  ApiKey: "your-openai-api-key"
  BaseURL: "https://api.openai.com/v1"
  EmbeddingModel: "text-embedding-3-small"
  EvaluationModel: "gpt-4.1-mini"
  EvaluationTemp: 0.2
  MaxCompletionTokens: 1200

MCP:
  Endpoint: "127.0.0.1:8080"

Resume:
  MaxChunkSize: 1000

# ----------------------------
# 2. JWT 鉴权配置
# ----------------------------
# 必须与 user.api 文件中的 jwt: Auth 对应
Auth:
  # 用于签发和验证 AccessToken 的密钥，必须足够复杂，且严格保密！
  AccessSecret: "Your_AccessSecret_Key_Here"
  # AccessToken 的有效期，单位：秒 (例如 7200 秒 = 2 小时)
  AccessExpire: 7200

# ----------------------------
# 3. Redis 配置
# ----------------------------
# 用于存储 RefreshToken 白名单，实现服务端会话管理
Redis:
  Host: "127.0.0.1:6379"
  # GoZero 推荐使用 Pass 字段名
  # Pass: ""
  Type: "node" # 'node' for standalone, 'cluster' for cluster
  # DB: 0 # 如果需要，可以指定数据库编号
